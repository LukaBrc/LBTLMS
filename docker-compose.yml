services:

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: library
      MYSQL_USER: lbt_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  lms:
      build: .
      environment:
        SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/library?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
        SPRING_DATASOURCE_USERNAME: lbt_user
        DB_PASSWORD: ${DB_PASSWORD}
      ports:
        - "8080:8080"
      depends_on:
        mysql:
          condition: service_healthy

volumes:
  mysql-data:
